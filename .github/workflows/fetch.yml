name: Fetch Latest Posts

on:
  schedule:
    # Run daily at 8:00 AM Beijing Time (UTC+8 = 00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch posts
        run: node scripts/fetch.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/posts.json
          git diff --staged --quiet || git commit -m "chore: auto-update posts $(date +%Y-%m-%d)"
          git push
